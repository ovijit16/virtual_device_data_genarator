name: IoT Data Sync

on:
  schedule:
    # This runs every 5 minutes (GitHub's minimum allowed interval)
    # - cron: '*/5 * * * *'
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch: # This allows you to keep the manual "Run workflow" button

jobs:
  run-sync:
    runs-on: ubuntu-latest
    # This permission is REQUIRED to push the timestamp file back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # fetch-depth: 0 is needed to allow amending and force-pushing history
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        run: python main.py

      - name: Commit and Force Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add last_timestamp.txt
          
          # Check if there is a change to commit
          if ! git diff --cached --quiet; then
            # 1. Try to amend the previous commit to keep history clean
            # 2. If it fails (e.g., first run), create a new commit
            git commit --amend -m "Bot: Update last processed timestamp" || git commit -m "Bot: Update last processed timestamp"
            
            # Force push to overwrite the last commit on the server
            git push --force
          else
            echo "No changes in data. Skipping commit."
          fi
